<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,600;0,700;1,700&family=Titillium+Web:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Crect width=%2764%27 height=%2764%27 rx=%2712%27 fill=%27%230a0a0b%27/%3E%3Ctext x=%2732%27 y=%2746%27 font-family=%27Arial Black,sans-serif%27 font-size=%2740%27 font-style=%27italic%27 font-weight=%27900%27 fill=%27%23b8ff00%27 text-anchor=%27middle%27%3EB%3C/text%3E%3C/svg%3E">
<title>Bradford Leaderboard</title>
<style>
  :root {
    --bg:#0a0a0b; --panel:#111113; --panel2:#19191c; --text:#edf2e4;
    --muted:#8b9384; --accent:#b8ff00; --line:#26262b;
    --gold:#b8ff00; --silver:#c8d2dc; --bronze:#cd8b4f; --danger:#ff5252;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 "Titillium Web", -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  body::before { content:""; display:block; height:3px;
    background:linear-gradient(90deg, var(--accent) 0%, rgba(184,255,0,.25) 45%, transparent 80%); }
  .brand h1 { margin:0 0 4px; font:italic 700 27px/1.1 "Chakra Petch",sans-serif;
    text-transform:uppercase; letter-spacing:.5px; color:var(--text); }
  .brand h1::before { content:"//"; color:var(--accent); margin-right:10px; }
  .brand h1 .ln { color:var(--accent); }
  .brand p { margin:0 0 60px; color:var(--muted); font-size:12px;
    text-transform:uppercase; letter-spacing:2px; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 40px 16px 60px; }
  .controls { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 22px; }
  .field { display: flex; flex-direction: column; gap: 6px; flex: 1 1 240px; }
  label { font: 600 11px "Chakra Petch", sans-serif; text-transform: uppercase;
    letter-spacing: 1.4px; color: var(--muted); }
  select {
    appearance: none; background: var(--panel); color: var(--text);
    border: 1px solid var(--line); border-radius: 0; padding: 10px 12px;
    font: 15px "Titillium Web", sans-serif; cursor: pointer;
  }
  select:focus { outline: none; border-color: var(--accent); }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 0;
    overflow: hidden;
  }
  .card-head {
    padding: 14px 18px; border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: baseline; gap: 10px;
  }
  .card-head .combo { font: italic 600 15px "Chakra Petch", sans-serif;
    text-transform: uppercase; letter-spacing: .4px; }
  .card-head .count { color: var(--muted); font-size: 13px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 11px 18px; text-align: left; }
  th { font: 600 11px "Chakra Petch", sans-serif; text-transform: uppercase;
    letter-spacing: 1.2px; color: var(--muted); }
  tbody tr { border-top: 1px solid var(--line); }
  tbody tr:hover { background: var(--panel2); }
  td.rank { width: 46px; font-variant-numeric: tabular-nums; color: var(--muted); }
  td.time, td.gap { text-align: right; font-variant-numeric: tabular-nums; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  td.gap { color: var(--muted); }
  td.user { font-weight: 600; }
  tr.p1 td.rank { color: var(--gold); font-weight: 700; }
  tr.p1 td.time { color: var(--accent); }
  tr.p2 td.rank { color: var(--silver); font-weight: 700; }
  tr.p3 td.rank { color: var(--bronze); font-weight: 700; }
  .badge { font-size: 10px; padding: 1px 6px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); margin-left: 8px; vertical-align: middle; }
  tbody tr[data-href] { cursor: pointer; }
  tbody tr[data-href]:hover { background: var(--panel2); box-shadow: inset 3px 0 0 var(--accent); }
  .head-right { display: flex; align-items: center; gap: 12px; }
  .toggle { display: inline-flex; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  .toggle button {
    background: none; border: 0; color: var(--muted);
    font: 600 11px "Chakra Petch", sans-serif; text-transform: uppercase;
    letter-spacing: .8px; padding: 5px 10px; cursor: pointer;
  }
  .toggle button + button { border-left: 1px solid var(--line); }
  .toggle button.on { background: var(--accent); color: #0a0a0b; }
  .empty { padding: 40px 18px; text-align: center; color: var(--muted); }
  @media (max-width: 760px) { .seccol { display: none; } }
  footer { margin-top: 64px; color: var(--muted); font-size: 11px; text-align: center;
    font-family: "Chakra Petch", sans-serif; text-transform: uppercase; letter-spacing: 1.2px; }
  footer .fbrand { color: var(--accent); }
  .updated { color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <header class="brand">
    <h1>Bradford<span class="ln"> Leaderboard</span></h1>
    <p>Fastest valid laps per track &amp; car combination.</p>
  </header>

  <div class="controls">
    <div class="field">
      <label for="combo">Track &amp; Car</label>
      <select id="combo"><option value="">Select combination…</option></select>
    </div>
    <div class="field">
      <label for="user">Highlight driver</label>
      <select id="user"><option value="">All drivers</option></select>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <span class="combo" id="head">—</span>
      <span class="head-right">
        <span class="toggle" id="viewToggle">
          <button type="button" id="viewAll">All laps</button><button type="button" id="viewBest">Best only</button>
        </span>
        <span class="count" id="count"></span>
      </span>
    </div>
    <div id="board"><div class="empty">Loading…</div></div>
  </div>

  <footer>
    <span class="fbrand">//</span> Bradford Leaderboard &nbsp;·&nbsp;
    <span class="updated" id="updated"></span>
  </footer>
</div>

<script>
(function () {
  var records = [], users = [], highlight = "";
  var viewMode = "all"; // "all" = every lap, "best" = each driver's fastest
  try {
    var savedView = localStorage.getItem("acl_view_mode");
    if (savedView === "all" || savedView === "best") viewMode = savedView;
  } catch (e) { /* localStorage unavailable */ }

  function pretty(id) {
    if (!id) return "";
    return id.replace(/_/g, " ").replace(/\b\w/g, function (c) { return c.toUpperCase(); });
  }
  function comboKey(r) { return [r.track, r.config || "", r.car].join("|"); }
  function comboLabel(r) {
    var t = pretty(r.track) + (r.config ? " (" + pretty(r.config) + ")" : "");
    return t + " — " + pretty(r.car);
  }
  function fmtGap(ms) {
    if (!ms) return "";
    return "+" + Math.floor(ms / 1000) + "." + String(ms % 1000).padStart(3, "0");
  }

  function bestPerUser(rows) {
    var by = {};
    rows.forEach(function (r) {
      var k = (r.user || "").toLowerCase();
      if (!by[k] || r.time_ms < by[k].time_ms) by[k] = r;
    });
    return Object.keys(by).map(function (k) { return by[k]; })
      .sort(function (a, b) { return a.time_ms - b.time_ms; });
  }

  // Trophy rule: within one combo, rank each driver's own laps by time_ms
  // ascending; their fastest = gold, 2nd = silver, 3rd = bronze.
  var TROPHIES = ["🥇", "🥈", "🥉"];
  function assignTrophies(rows) {
    var byUser = {};
    rows.forEach(function (r) {
      var k = (r.user || "").toLowerCase();
      (byUser[k] = byUser[k] || []).push(r);
    });
    Object.keys(byUser).forEach(function (k) {
      byUser[k].sort(function (a, b) { return a.time_ms - b.time_ms; })
        .forEach(function (r, i) { r._trophy = TROPHIES[i] || ""; });
    });
    return Object.keys(byUser).length;
  }

  function render() {
    var combo = document.getElementById("combo").value;
    var head = document.getElementById("head");
    var board = document.getElementById("board");
    var count = document.getElementById("count");
    updateToggle();
    if (!combo) {
      head.textContent = "—"; count.textContent = "";
      board.innerHTML = '<div class="empty">Choose a track &amp; car combination above.</div>';
      return;
    }
    var all = records.filter(function (r) { return comboKey(r) === combo; })
      .slice().sort(function (a, b) { return a.time_ms - b.time_ms; });
    var nDrivers = assignTrophies(all);
    var rows = viewMode === "best" ? bestPerUser(all) : all;
    head.textContent = rows.length ? comboLabel(rows[0]) : "—";
    count.textContent = rows.length + (rows.length === 1 ? " lap" : " laps") +
      " · " + nDrivers + (nDrivers === 1 ? " driver" : " drivers");
    if (!rows.length) {
      board.innerHTML = '<div class="empty">No times yet.</div>';
      return;
    }
    var leader = rows[0].time_ms; // fastest lap shown in the current view mode
    // sector columns (desktop only): as many as any lap in the combo has
    var nSec = 0;
    all.forEach(function (r) {
      if (r.splits && r.splits.length > nSec) nSec = Math.min(r.splits.length, 4);
    });
    var html = '<table><thead><tr><th>#</th><th>Driver</th><th style="text-align:right">Time</th>';
    for (var si = 0; si < nSec; si++) html += '<th class="seccol" style="text-align:right">S' + (si + 1) + '</th>';
    html += '<th style="text-align:right">Gap</th></tr></thead><tbody>';
    rows.forEach(function (r, i) {
      var cls = i < 3 ? "p" + (i + 1) : "";
      if (highlight && (r.user || "").toLowerCase() === highlight) cls += " hl";
      var badge = r.source === "manual" ? '<span class="badge">manual</span>' : "";
      var trophy = r._trophy ? r._trophy + " " : "";
      html += '<tr class="' + cls + '" data-href="' + escapeHtml(lapHref(r)) + '">' +
        '<td class="rank">' + (i + 1) + '</td>' +
        '<td class="user">' + trophy + escapeHtml(r.user) + badge + '</td>' +
        '<td class="time">' + fmtTime(r.time_ms) + '</td>';
      for (var sj = 0; sj < nSec; sj++) {
        var sv = r.splits && r.splits[sj] != null ? (r.splits[sj] / 1000).toFixed(3) : "—";
        html += '<td class="gap seccol">' + sv + '</td>';
      }
      html += '<td class="gap">' + fmtGap(r.time_ms - leader) + '</td></tr>';
    });
    html += '</tbody></table>';
    board.innerHTML = html;
  }

  function fmtTime(ms) {
    var m = Math.floor(ms / 60000), s = Math.floor((ms % 60000) / 1000), mm = ms % 1000;
    return m + ":" + String(s).padStart(2, "0") + "." + String(mm).padStart(3, "0");
  }
  function lapHref(r) {
    var e = encodeURIComponent;
    return "lap.html?t=" + e(r.track) + "&c=" + e(r.config || "") +
           "&car=" + e(r.car) + "&d=" + e(r.user) + "&ms=" + e(r.time_ms);
  }
  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }

  function fillCombos() {
    var seen = {}, opts = [];
    records.forEach(function (r) {
      var k = comboKey(r);
      if (!seen[k]) { seen[k] = true; opts.push({ k: k, label: comboLabel(r) }); }
    });
    opts.sort(function (a, b) { return a.label.localeCompare(b.label); });
    var sel = document.getElementById("combo");
    opts.forEach(function (o) {
      var el = document.createElement("option");
      el.value = o.k; el.textContent = o.label; sel.appendChild(el);
    });
  }
  function fillUsers() {
    var all = {};
    users.forEach(function (u) { all[u] = true; });
    records.forEach(function (r) { if (r.user) all[r.user] = true; });
    var sel = document.getElementById("user");
    Object.keys(all).sort(function (a, b) { return a.localeCompare(b); }).forEach(function (u) {
      var el = document.createElement("option");
      el.value = u.toLowerCase(); el.textContent = u; sel.appendChild(el);
    });
  }

  function getJSON(url) {
    return fetch(url, { cache: "no-store" }).then(function (r) {
      if (!r.ok) throw new Error(url + " " + r.status);
      return r.json();
    });
  }

  function updateToggle() {
    document.getElementById("viewAll").className = viewMode === "all" ? "on" : "";
    document.getElementById("viewBest").className = viewMode === "best" ? "on" : "";
  }
  function setView(mode) {
    viewMode = mode;
    try { localStorage.setItem("acl_view_mode", mode); } catch (e) { /* ignore */ }
    render();
  }

  document.getElementById("combo").addEventListener("change", render);
  document.getElementById("user").addEventListener("change", function (e) {
    highlight = e.target.value; render();
  });
  document.getElementById("viewAll").addEventListener("click", function () { setView("all"); });
  document.getElementById("viewBest").addEventListener("click", function () { setView("best"); });
  document.getElementById("board").addEventListener("click", function (e) {
    var el = e.target, tr = null;
    while (el && el !== this) {
      if (el.tagName === "TR" && el.getAttribute("data-href")) { tr = el; break; }
      el = el.parentNode;
    }
    if (tr) window.location.href = tr.getAttribute("data-href");
  });

  Promise.all([
    getJSON("data/records.json").catch(function () { return []; }),
    getJSON("data/users.json").catch(function () { return []; })
  ]).then(function (res) {
    records = Array.isArray(res[0]) ? res[0] : [];
    users = Array.isArray(res[1]) ? res[1] : [];
    fillCombos(); fillUsers(); render();
    document.getElementById("updated").textContent =
      records.length ? (records.length + " times recorded") : "No times recorded yet.";
    var first = document.getElementById("combo");
    if (first.options.length === 2) { first.selectedIndex = 1; render(); }
  });

  // Highlight style injected here to keep it near its logic.
  var st = document.createElement("style");
  st.textContent = "tr.hl td { background: color-mix(in srgb, var(--accent) 18%, transparent); }";
  document.head.appendChild(st);
})();
</script>
</body>
</html>
