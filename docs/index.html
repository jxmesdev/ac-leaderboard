<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,600;0,700;1,700&family=Titillium+Web:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Crect width=%2764%27 height=%2764%27 rx=%2712%27 fill=%27%230a0a0b%27/%3E%3Ctext x=%2732%27 y=%2746%27 font-family=%27Arial Black,sans-serif%27 font-size=%2740%27 font-style=%27italic%27 font-weight=%27900%27 fill=%27%23b8ff00%27 text-anchor=%27middle%27%3EB%3C/text%3E%3C/svg%3E">
<title>Bradford Leaderboard</title>
<style>
  :root {
    --bg:#0a0a0b; --panel:#111113; --panel2:#19191c; --text:#edf2e4;
    --muted:#8b9384; --accent:#b8ff00; --line:#26262b;
    --gold:#b8ff00; --silver:#c8d2dc; --bronze:#cd8b4f; --danger:#ff5252;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 "Titillium Web", -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  body::before { content:""; display:block; height:3px;
    background:linear-gradient(90deg, var(--accent) 0%, rgba(184,255,0,.25) 45%, transparent 80%); }
  .brand h1 { margin:0 0 4px; font:italic 700 27px/1.1 "Chakra Petch",sans-serif;
    text-transform:uppercase; letter-spacing:.5px; color:var(--text); }
  .brand h1::before { content:"//"; color:var(--accent); margin-right:10px; }
  .brand h1 .ln { color:var(--accent); }
  .brand p { margin:0 0 60px; color:var(--muted); font-size:12px;
    text-transform:uppercase; letter-spacing:2px; }
  .wrap { max-width: 2560px; margin: 0 auto; padding: 40px 16px 60px; width: 100%;
    min-height: 100vh; display: flex; flex-direction: column; }
  .wrap > * { flex: 0 0 auto; }
  .controls { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 22px; }
  .field { display: flex; flex-direction: column; gap: 6px; flex: 1 1 240px; }
  label { font: 600 11px "Chakra Petch", sans-serif; text-transform: uppercase;
    letter-spacing: 1.4px; color: var(--muted); }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 0;
    overflow: hidden;
  }
  .card-head {
    padding: 14px 18px; border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: baseline; gap: 10px;
  }
  .card-head .combo { font: italic 600 15px "Chakra Petch", sans-serif;
    text-transform: uppercase; letter-spacing: .4px; }
  .card-head .count { color: var(--muted); font-size: 13px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 11px 18px; text-align: left; }
  th { font: 600 11px "Chakra Petch", sans-serif; text-transform: uppercase;
    letter-spacing: 1.2px; color: var(--muted); }
  tbody tr { border-top: 1px solid var(--line); }
  tbody tr:hover { background: var(--panel2); }
  td.rank { width: 46px; font-variant-numeric: tabular-nums; color: var(--muted); }
  td.time, td.gap { text-align: right; font-variant-numeric: tabular-nums; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  td.gap { color: var(--muted); }
  td.user { font-weight: 600; }
  tr.p1 td.rank { color: var(--gold); font-weight: 700; font-style: italic; }
  tr.p1 td.time { color: var(--accent); }
  tr.p2 td.rank { color: var(--silver); font-weight: 700; font-style: italic; }
  tr.p3 td.rank { color: var(--bronze); font-weight: 700; font-style: italic; }
  .secgap { font-size: 10px; }
  .badge { font-size: 10px; padding: 1px 6px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); margin-left: 8px; vertical-align: middle; }
  tbody tr[data-href] { cursor: pointer; }
  tbody tr[data-href]:hover { background: var(--panel2); box-shadow: inset 3px 0 0 var(--accent); }
  .head-right { display: flex; align-items: center; gap: 12px; }
  .toggle { display: inline-flex; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  .toggle button {
    background: none; border: 0; color: var(--muted);
    font: 600 11px "Chakra Petch", sans-serif; text-transform: uppercase;
    letter-spacing: .8px; padding: 5px 10px; cursor: pointer;
  }
  .toggle button + button { border-left: 1px solid var(--line); }
  .toggle button.on { background: var(--accent); color: #0a0a0b; }
  .empty { padding: 40px 18px; text-align: center; color: var(--muted); }
  .multi { position: relative; }
  .multibtn {
    width: 100%; text-align: left; appearance: none;
    background: var(--panel); color: var(--text);
    border: 1px solid var(--line); border-radius: 0; padding: 10px 12px;
    font: 15px "Titillium Web", sans-serif; cursor: pointer;
  }
  .multibtn:focus { outline: none; border-color: var(--accent); }
  .multibtn::after { content: "▾"; float: right; color: var(--muted); }
  .multipop {
    display: none; position: absolute; z-index: 30; left: 0; right: 0; top: 100%;
    margin-top: 2px; background: var(--panel); border: 1px solid var(--line);
    max-height: 280px; overflow: auto;
  }
  .multipop.open { display: block; }
  .multipop label {
    display: flex; align-items: center; gap: 10px; padding: 9px 12px;
    cursor: pointer; font: 15px "Titillium Web", sans-serif;
    text-transform: none; letter-spacing: 0; color: var(--text);
  }
  .multipop label:hover { background: var(--panel2); }
  .multipop > * + * { border-top: 1px solid var(--line); }
  .multipop input { accent-color: var(--accent); margin: 0; }
  .multipop .row {
    padding: 9px 12px; cursor: pointer;
    font: 15px "Titillium Web", sans-serif; color: var(--text);
  }
  .multipop .row:hover { background: var(--panel2); }
  .multipop .row.sel { color: var(--accent); }
  .optlap { padding: 10px 18px; border-top: 1px solid var(--line);
    color: var(--muted); font-size: 12px; }
  .optlap b { color: var(--accent); font-weight: 600;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  @media (max-width: 760px) { .seccol { display: none; } }
  footer { margin-top: auto; padding-top: 64px; color: var(--muted); font-size: 11px; text-align: center;
    font-family: "Chakra Petch", sans-serif; text-transform: uppercase; letter-spacing: 1.2px; }
  footer .fbrand { color: var(--accent); }
  .updated { color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <header class="brand">
    <h1>Bradford<span class="ln"> Leaderboard</span></h1>
    <p>Fastest valid laps per track &amp; car combination.</p>
  </header>

  <div class="controls">
    <div class="field">
      <label for="combobtn">Track &amp; Car</label>
      <div class="multi">
        <button type="button" class="multibtn" id="combobtn">Select combination…</button>
        <div class="multipop" id="combopop"></div>
      </div>
    </div>
    <div class="field">
      <label for="userbtn">Filter driver</label>
      <div class="multi">
        <button type="button" class="multibtn" id="userbtn">All drivers</button>
        <div class="multipop" id="userpop"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <span class="combo" id="head">—</span>
      <span class="head-right">
        <span class="toggle" id="viewToggle">
          <button type="button" id="viewBest">Best laps</button><button type="button" id="viewAll">All laps</button>
        </span>
        <span class="count" id="count"></span>
      </span>
    </div>
    <div id="board"><div class="empty">Loading…</div></div>
  </div>

  <footer><span class="fbrand">//</span> Bradford Leaderboard &nbsp;·&nbsp; Assetto Corsa lap telemetry</footer>
</div>

<script>
(function () {
  var records = [], users = [];
  var comboVal = "", comboOpts = [];   // selected track+car combo
  var driverNames = [];   // display names, sorted, unique per ukey
  var filterSel = {};     // ukey(name) -> true; empty = all drivers
  function filterActive() { return Object.keys(filterSel).length > 0; }
  // Driver names are user-typed: prefix object keys so names like
  // "constructor" or "__proto__" can't collide with Object.prototype.
  function ukey(u) { return "u:" + String(u == null ? "" : u).toLowerCase(); }
  var viewMode = "best"; // "best" = each driver's fastest, "all" = every lap
  try {
    // v2 key: the default flipped to "best"; the old key would pin everyone
    // to their previously-saved "all".
    var savedView = localStorage.getItem("acl_view_mode2");
    if (savedView === "all" || savedView === "best") viewMode = savedView;
  } catch (e) { /* localStorage unavailable */ }

  function pretty(id) {
    if (!id) return "";
    return id.replace(/_/g, " ").replace(/\b\w/g, function (c) { return c.toUpperCase(); });
  }
  function comboKey(r) { return [r.track, r.config || "", r.car].join("|"); }
  function comboLabel(r) {
    var t = pretty(r.track) + (r.config ? " (" + pretty(r.config) + ")" : "");
    return t + " — " + pretty(r.car);
  }
  function fmtGap(ms) {
    if (!ms) return "";
    return "+" + Math.floor(ms / 1000) + "." + String(ms % 1000).padStart(3, "0");
  }

  function bestPerUser(rows) {
    var by = {};
    rows.forEach(function (r) {
      var k = ukey(r.user);
      if (!by[k] || r.time_ms < by[k].time_ms) by[k] = r;
    });
    return Object.keys(by).map(function (k) { return by[k]; })
      .sort(function (a, b) { return a.time_ms - b.time_ms; });
  }

  // Trophy rule: within one combo, rank each driver's own laps by time_ms
  // ascending; their fastest = gold, 2nd = silver, 3rd = bronze.
  var TROPHIES = ["🥇", "🥈", "🥉"];
  function assignTrophies(rows) {
    var byUser = {};
    rows.forEach(function (r) {
      var k = ukey(r.user);
      if (!byUser[k]) byUser[k] = [];
      byUser[k].push(r);
    });
    Object.keys(byUser).forEach(function (k) {
      byUser[k].sort(function (a, b) { return a.time_ms - b.time_ms; })
        .forEach(function (r, i) { r._trophy = TROPHIES[i] || ""; });
    });
    return Object.keys(byUser).length;
  }

  function render() {
    var combo = comboVal;
    var head = document.getElementById("head");
    var board = document.getElementById("board");
    var count = document.getElementById("count");
    updateToggle();
    if (!combo) {
      head.textContent = "—"; count.textContent = "";
      board.innerHTML = '<div class="empty">Choose a track &amp; car combination above.</div>';
      return;
    }
    var all = records.filter(function (r) { return comboKey(r) === combo; })
      .slice().sort(function (a, b) { return a.time_ms - b.time_ms; });
    assignTrophies(all);   // trophies come from the FULL combo, filter or not
    var pool = filterActive()
      ? all.filter(function (r) { return filterSel[ukey(r.user)]; })
      : all;
    var rows = viewMode === "best" ? bestPerUser(pool) : pool;
    head.textContent = all.length ? comboLabel(all[0]) : "—";
    var vd = {};
    rows.forEach(function (r) { vd[ukey(r.user)] = true; });
    var nShown = Object.keys(vd).length;
    count.textContent = rows.length + (rows.length === 1 ? " lap" : " laps") +
      " · " + nShown + (nShown === 1 ? " driver" : " drivers");
    if (!rows.length) {
      board.innerHTML = '<div class="empty">' + (filterActive()
        ? "No laps for the selected drivers." : "No times yet.") + '</div>';
      return;
    }
    var lead = rows[0]; // fastest lap shown in the current view + filter
    // sector columns (desktop only): as many as any visible ROW has
    var nSec = 0;
    rows.forEach(function (r) {
      if (r.splits && r.splits.length > nSec) nSec = Math.min(r.splits.length, 4);
    });
    var html = '<table><thead><tr><th>#</th><th>Driver</th>' +
      '<th style="text-align:right">Time</th>';
    for (var si = 0; si < nSec; si++) html += '<th class="seccol" style="text-align:right">S' + (si + 1) + '</th>';
    html += '<th style="text-align:right">Gap</th></tr></thead><tbody>';
    rows.forEach(function (r, i) {
      var cls = i < 3 ? "p" + (i + 1) : "";
      var badge = r.source === "manual" ? '<span class="badge">manual</span>' : "";
      // Best-laps view: one row per driver, so medals are noise.
      var trophy = (viewMode !== "best" && r._trophy) ? r._trophy + " " : "";
      html += '<tr class="' + cls + '" data-href="' + escapeHtml(lapHref(r)) + '">' +
        '<td class="rank">' + (i + 1) + '</td>' +
        '<td class="user">' + trophy + escapeHtml(r.user) + badge + '</td>' +
        '<td class="time">' + fmtTime(r.time_ms) + '</td>';
      for (var sj = 0; sj < nSec; sj++) {
        var has = r.splits && r.splits[sj] != null;
        var sv = has ? (r.splits[sj] / 1000).toFixed(3) : "—";
        var sg = "";
        // gap vs the leader's sector, small and red/green, left of the time
        if (i > 0 && has && lead.splits && lead.splits[sj] != null) {
          var d = r.splits[sj] - lead.splits[sj];
          var gcol = d < 0 ? "var(--accent)" : (d > 0 ? "var(--danger)" : "var(--muted)");
          sg = '<span class="secgap" style="color:' + gcol + '">(' +
               (d >= 0 ? "+" : "") + (d / 1000).toFixed(3) + ')</span> ';
        }
        html += '<td class="gap seccol">' + sg + sv + '</td>';
      }
      html += '<td class="gap">' + fmtGap(r.time_ms - lead.time_ms) + '</td></tr>';
    });
    html += '</tbody></table>';
    // Optimal lap: best of each sector across the FILTERED laps (pool, both
    // view modes), summed. Hidden when any sector has no data at all.
    var bests = [], nOpt = 0;
    pool.forEach(function (r) {
      if (r.splits && r.splits.length > nOpt) nOpt = Math.min(r.splits.length, 4);
    });
    for (var bi = 0; bi < nOpt; bi++) {
      var b = null;
      pool.forEach(function (r) {
        var v = r.splits ? r.splits[bi] : null;
        if (v != null && (b == null || v < b)) b = v;
      });
      bests.push(b);
    }
    if (nOpt && bests.indexOf(null) < 0) {
      var tot = 0;
      bests.forEach(function (v) { tot += v; });
      var parts = bests.map(function (v, k) {
        return 'S' + (k + 1) + ' ' + (v / 1000).toFixed(3);
      });
      html += '<div class="optlap">Optimal lap <b>' + fmtTime(tot) + '</b>' +
        ' · ' + parts.join(' · ') + '</div>';
    }
    board.innerHTML = html;
  }

  function fmtTime(ms) {
    var m = Math.floor(ms / 60000), s = Math.floor((ms % 60000) / 1000), mm = ms % 1000;
    return m + ":" + String(s).padStart(2, "0") + "." + String(mm).padStart(3, "0");
  }
  function lapHref(r) {
    var e = encodeURIComponent;
    return "lap.html?t=" + e(r.track) + "&c=" + e(r.config || "") +
           "&car=" + e(r.car) + "&d=" + e(r.user) + "&ms=" + e(r.time_ms);
  }
  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }

  function fillCombos() {
    var seen = {};
    comboOpts = [];
    records.forEach(function (r) {
      var k = comboKey(r);
      if (!seen[k]) { seen[k] = true; comboOpts.push({ k: k, label: comboLabel(r) }); }
    });
    comboOpts.sort(function (a, b) { return a.label.localeCompare(b.label); });
    renderComboPop();
  }

  // Track & Car: same styled dropdown as Filter driver, single-select.
  function renderComboPop() {
    var pop = document.getElementById("combopop");
    pop.innerHTML = "";
    comboOpts.forEach(function (o) {
      var row = document.createElement("div");
      row.className = "row" + (o.k === comboVal ? " sel" : "");
      row.textContent = o.label;
      row.addEventListener("click", function () {
        comboVal = o.k;
        renderComboPop();
        pop.classList.remove("open");
        render();
      });
      pop.appendChild(row);
    });
    document.getElementById("combobtn").textContent = comboVal
      ? comboOpts.filter(function (o) { return o.k === comboVal; })[0].label
      : "Select combination…";
  }
  function fillUsers() {
    // unique per ukey: "Test" from users.json and "test" from a record must
    // become ONE dropdown row, or the tick-everyone reset can never fire
    var seen = {}, list = [];
    users.concat(records.map(function (r) { return r.user; })).forEach(function (u) {
      if (!u) return;
      var k = ukey(u);
      if (!seen[k]) { seen[k] = true; list.push(u); }
    });
    driverNames = list.sort(function (a, b) { return a.localeCompare(b); });
    renderUserFilter();
  }

  // "Filter driver" is a checkbox dropdown: tick any number of drivers and
  // the board FILTERS to them (ticking everyone == no filter).
  function renderUserFilter() {
    var pop = document.getElementById("userpop");
    var st = pop.scrollTop;   // rebuilding must not snap a long list to top
    pop.innerHTML = "";
    function addRow(text, checked, onchange) {
      var lab = document.createElement("label");
      var cb = document.createElement("input");
      cb.type = "checkbox"; cb.checked = checked;
      cb.addEventListener("change", onchange);
      lab.appendChild(cb); lab.appendChild(document.createTextNode(text));
      pop.appendChild(lab);
    }
    addRow("All drivers", !filterActive(), function () {
      filterSel = {}; renderUserFilter(); render();
    });
    driverNames.forEach(function (u) {
      var k = ukey(u);
      addRow(u, !!filterSel[k], function (e) {
        if (e.target.checked) filterSel[k] = true; else delete filterSel[k];
        if (Object.keys(filterSel).length >= driverNames.length) filterSel = {};
        renderUserFilter(); render();
      });
    });
    var n = Object.keys(filterSel).length;
    document.getElementById("userbtn").textContent =
      !n ? "All drivers"
        : n === 1 ? driverNames.filter(function (u) { return filterSel[ukey(u)]; })[0]
        : n + " drivers";
    pop.scrollTop = st;
  }

  function getJSON(url) {
    // tiny + must always be fresh (new laps appear the moment Pages deploys)
    return fetch(url, { cache: "no-store" }).then(function (r) {
      if (!r.ok) throw new Error(url + " " + r.status);
      return r.json();
    });
  }

  function updateToggle() {
    document.getElementById("viewAll").className = viewMode === "all" ? "on" : "";
    document.getElementById("viewBest").className = viewMode === "best" ? "on" : "";
  }
  function setView(mode) {
    viewMode = mode;
    try { localStorage.setItem("acl_view_mode2", mode); } catch (e) { /* ignore */ }
    render();
  }

  function wirePop(btnId, popId, otherId) {
    document.getElementById(btnId).addEventListener("click", function (e) {
      e.stopPropagation();
      document.getElementById(otherId).classList.remove("open");
      document.getElementById(popId).classList.toggle("open");
    });
  }
  wirePop("combobtn", "combopop", "userpop");
  wirePop("userbtn", "userpop", "combopop");
  document.addEventListener("click", function (e) {
    ["combopop", "userpop"].forEach(function (id) {
      var pop = document.getElementById(id);
      if (pop.classList.contains("open") && !pop.contains(e.target)) {
        pop.classList.remove("open");
      }
    });
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      document.getElementById("combopop").classList.remove("open");
      document.getElementById("userpop").classList.remove("open");
    }
  });
  document.getElementById("viewAll").addEventListener("click", function () { setView("all"); });
  document.getElementById("viewBest").addEventListener("click", function () { setView("best"); });
  document.getElementById("board").addEventListener("click", function (e) {
    var el = e.target, tr = null;
    while (el && el !== this) {
      if (el.tagName === "TR" && el.getAttribute("data-href")) { tr = el; break; }
      el = el.parentNode;
    }
    if (tr) window.location.href = tr.getAttribute("data-href");
  });

  Promise.all([
    getJSON("data/records.json").catch(function () { return []; }),
    getJSON("data/users.json").catch(function () { return []; })
  ]).then(function (res) {
    records = Array.isArray(res[0]) ? res[0] : [];
    users = Array.isArray(res[1]) ? res[1] : [];
    fillCombos(); fillUsers();
    if (comboOpts.length === 1) { comboVal = comboOpts[0].k; renderComboPop(); }
    render();
  });
})();
</script>
</body>
</html>
