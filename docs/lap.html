<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lap Telemetry · Bradford Leaderboard</title>
<style>
  :root {
    --bg:#0e1116; --panel:#171b22; --panel2:#1e232c; --text:#e6edf3;
    --muted:#8b949e; --line:#2a303a; --accent:#f5a623;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg:#f6f8fa; --panel:#fff; --panel2:#f0f3f6; --text:#1f2328;
            --muted:#656d76; --line:#d0d7de; --accent:#d97706; }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap { max-width:1100px; margin:0 auto; padding:28px 16px 60px; }
  a { color:var(--accent); text-decoration:none; }
  a:hover { text-decoration:underline; }
  a.brand { display:block; color:var(--text); margin-bottom:30px; }
  a.brand:hover { text-decoration:none; }
  .brand h1 { font-size:26px; margin:0 0 4px; letter-spacing:.3px; }
  .brand p { margin:0; color:var(--muted); font-size:13px; }
  .top { display:flex; justify-content:space-between; align-items:baseline; gap:12px; flex-wrap:wrap; }
  h1 { font-size:20px; margin:0 0 2px; }
  .sub { color:var(--muted); font-size:13px; }
  .grid { display:grid; grid-template-columns:minmax(0,1fr) 300px; gap:16px; margin-top:16px; }
  @media (max-width:820px){ .grid { grid-template-columns:1fr; } }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; }
  .card h2 { font-size:12px; text-transform:uppercase; letter-spacing:.6px;
    color:var(--muted); margin:0; padding:10px 14px; border-bottom:1px solid var(--line); }
  .mapwrap { padding:10px; }
  #map { width:100%; height:auto; display:block; }
  .laps { padding:6px 6px 10px; }
  .lap { display:flex; align-items:center; gap:8px; padding:7px 8px; border-radius:8px; cursor:pointer; }
  .lap:hover { background:var(--panel2); }
  .lap input { margin:0; }
  .swatch { width:12px; height:12px; border-radius:3px; flex:0 0 auto; }
  .lap .nm { font-weight:500; }
  .lap .tm { margin-left:auto; font-variant-numeric:tabular-nums;
    font-family:ui-monospace,Menlo,monospace; color:var(--muted); }
  .lap .dl { font-variant-numeric:tabular-nums; font-family:ui-monospace,Menlo,monospace; font-size:12px; }
  .traces { margin-top:16px; }
  .readout { padding:10px 14px; }
  .readout table { width:100%; border-collapse:collapse; font-size:12px;
    table-layout:fixed; }
  .readout th:first-child { width:22%; }
  .readout th, .readout td { text-align:right; padding:3px 4px; font-variant-numeric:tabular-nums; }
  .readout th:first-child, .readout td:first-child { text-align:left; }
  .readout thead th { color:var(--muted); font-weight:600; }
  .hint { color:var(--muted); font-size:12px; padding:0 14px 12px; }
  canvas.trace { width:100%; display:block; touch-action:none; }
  .empty { padding:40px; text-align:center; color:var(--muted); }
  .sectors { margin-top:16px; }
  .secbody { padding:10px 14px 12px; }
  .secbtns { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .secbtns button { background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:6px; padding:3px 12px; font:12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    cursor:pointer; }
  .secbtns button:hover { border-color:var(--muted); }
  .secbtns button.on { border-color:var(--accent); color:var(--accent); }
  .sectable { border-collapse:collapse; font-size:12px; }
  .sectable th, .sectable td { text-align:right; padding:3px 0 3px 22px;
    font-variant-numeric:tabular-nums; font-family:ui-monospace,Menlo,monospace; }
  .sectable th:first-child, .sectable td:first-child { text-align:left; padding-left:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .sectable thead th { color:var(--muted); font-weight:600; }
  .secmuted { color:var(--muted); font-size:12px; }
</style>
</head>
<body>
<div class="wrap">
  <a class="brand" href="index.html">
    <h1>🏁 Bradford Leaderboard</h1>
    <p>Fastest valid laps per track &amp; car combination.</p>
  </a>
  <div class="top">
    <div>
      <h1 id="title">Lap telemetry</h1>
      <div class="sub" id="subtitle">Loading…</div>
    </div>
  </div>

  <div id="content" style="display:none">
    <div class="grid">
      <div class="card">
        <h2>Track map</h2>
        <div class="mapwrap">
          <canvas id="map"></canvas>
          <div class="hint" style="padding:6px 4px 0">scroll = zoom · drag = pan · double-click = reset</div>
        </div>
      </div>
      <div class="card">
        <h2>Laps — click to overlay</h2>
        <div class="laps" id="laps"></div>
      </div>
    </div>
    <div class="card sectors">
      <h2>At cursor <span id="cursorpos" style="text-transform:none;letter-spacing:0;color:var(--muted)"></span></h2>
      <div class="readout"><table id="readout"></table></div>
      <div class="hint">Hover the traces or map to inspect. Δ = time gap to the primary lap at that point.</div>
    </div>
    <div class="card sectors" id="sectors" style="display:none">
      <h2>Sectors</h2>
      <div class="secbody" id="secbody"></div>
    </div>
    <div class="card traces" id="traces"></div>
  </div>

  <div id="error" class="empty" style="display:none"></div>
</div>

<script>
(function () {
  "use strict";
  var PALETTE = ["#f5a623","#58a6ff","#3fb950","#bc8cff","#f85149","#39c5cf","#db61a2","#d29922","#7ee787","#ff9bce"];
  var CH = [
    {key:"thr",  label:"Throttle", unit:"%",    lo:0, hi:100},
    {key:"brk",  label:"Brake",    unit:"%",    lo:0, hi:100},
    {key:"spd",  label:"Speed",    unit:"km/h", lo:0, hi:"auto"},
    {key:"gear", label:"Gear",     unit:"",     lo:0, hi:"auto", step:true},
    {key:"str",  label:"Steering", unit:"°", lo:"sym", hi:"sym"}
  ];

  var qs = new URLSearchParams(location.search);
  var want = {
    track: (qs.get("t")||"").toLowerCase(),
    config:(qs.get("c")||"").toLowerCase(),
    car:   (qs.get("car")||"").toLowerCase(),
    driver:(qs.get("d")||"").toLowerCase(),
    ms:    parseInt(qs.get("ms")||"",10)
  };

  var laps = [];        // {rec, color, shown, data|null, loading}
  var primary = null;
  var cursor = null;    // nsp 0..1 or null
  var raf = 0;
  var cam = {scale:1, x:0, y:0};   // map zoom/pan on top of the fit-to-view
  var focus = null;     // {i, d0, d1} sector focus (nsp domain), null = whole lap
  var mapFitPending = false;   // drawMap should recompute cam for the focus
  var mapP = null;      // world->screen transform of the LAST drawMap (for map hover)

  function pretty(id){ return (id||"").replace(/_/g," ").replace(/\b\w/g,function(c){return c.toUpperCase();}); }
  function fmtTime(ms){ if(ms==null) return "—"; var m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),mm=ms%1000;
    return m+":"+String(s).padStart(2,"0")+"."+String(mm).padStart(3,"0"); }
  function norm(s){ return (s==null?"":String(s)).trim().toLowerCase(); }
  // Mirrors acl_core.telemetry.slug: lowercase, non-alphanumerics -> "_".
  function slugjs(s){ return norm(s).replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,""); }
  // Driver names are user-typed in-game: escape wherever they enter innerHTML.
  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]; }); }
  var globalEdges=null;   // per-track true boundary, fetched by convention
  function comboMatch(r){ return norm(r.track)===want.track && norm(r.config||"")===want.config && norm(r.car)===want.car; }
  function getJSON(u){ return fetch(u,{cache:"no-store"}).then(function(r){ if(!r.ok) throw new Error(u+" "+r.status); return r.json(); }); }
  function fail(msg){ document.getElementById("subtitle").textContent="";
    var e=document.getElementById("error"); e.style.display="block"; e.textContent=msg; }

  getJSON("data/records.json").then(function(records){
    if(!Array.isArray(records)) records=[];
    var roster = records.filter(comboMatch).filter(function(r){return r.telemetry;});
    roster.sort(function(a,b){ return (a.time_ms||1e12)-(b.time_ms||1e12); });
    if(!roster.length){ fail("No telemetry found for this track & car combination."); return; }

    laps = roster.map(function(r,i){ return {rec:r, color:PALETTE[i%PALETTE.length], shown:false, data:null, loading:false}; });
    // trophies: within the combo, each driver's own laps ranked by time
    // (roster is time-sorted, so per-driver encounter order == their rank)
    var perDriver = {};
    laps.forEach(function(l){
      var k=norm(l.rec.user), c=perDriver[k]||0; perDriver[k]=c+1;
      l.trophy = ["🥇","🥈","🥉"][c] || "";
    });
    // primary: exact ?ms lap of driver d -> driver d's fastest -> fastest overall
    var mine = laps.filter(function(l){ return norm(l.rec.user)===want.driver; });
    primary = null;
    if(!isNaN(want.ms)){
      primary = mine.filter(function(l){ return l.rec.time_ms===want.ms; })[0] || null;
    }
    if(!primary) primary = mine[0] || laps[0];

    var combo = pretty(primary.rec.track) + (primary.rec.config? " ("+pretty(primary.rec.config)+")":"") + " — " + pretty(primary.rec.car);
    document.getElementById("title").textContent = combo;
    document.getElementById("subtitle").textContent = "Primary: " + primary.rec.user + "  ·  " + fmtTime(primary.rec.time_ms);
    document.title = "Telemetry · " + primary.rec.user + " · " + combo;

    buildTraceCanvases();
    renderLapList();
    document.getElementById("content").style.display="block";
    // True track boundary is published per-track (trackmaps/<slug>__edges.json)
    // -- fetch by naming convention so EXISTING laps get accurate edges too.
    getJSON("data/trackmaps/"+slugjs(primary.rec.track)+"__"+
            slugjs(primary.rec.config)+"__edges.json")
      .then(function(eg){ globalEdges=eg; scheduleRender(); })
      .catch(function(){});
    // show primary by default
    toggleLap(primary, true);
  }).catch(function(e){ fail("Could not load leaderboard data. " + e.message); });

  // ---- lap selection --------------------------------------------------
  function renderLapList(){
    var box=document.getElementById("laps"); box.innerHTML="";
    laps.forEach(function(l){
      var row=document.createElement("label"); row.className="lap";
      var cb=document.createElement("input"); cb.type="checkbox"; cb.checked=l.shown;
      cb.addEventListener("change",function(){ toggleLap(l, cb.checked); });
      var sw=document.createElement("span"); sw.className="swatch"; sw.style.background=l.color;
      var nm=document.createElement("span"); nm.className="nm";
      nm.textContent=(l.trophy? l.trophy+" ":"")+l.rec.user;
      var tm=document.createElement("span"); tm.className="tm"; tm.textContent=fmtTime(l.rec.time_ms);
      row.appendChild(cb); row.appendChild(sw); row.appendChild(nm); row.appendChild(tm);
      l._sw = sw; l._cb = cb;
      box.appendChild(row);
    });
  }

  function toggleLap(l, on){
    l.shown = on;
    if(on && !l.data && !l.loading){
      l.loading = true;
      getJSON("data/"+l.rec.telemetry).then(function(d){
        l.data=d; l.loading=false;
        // True track boundary (world metres, from ai/fast_lane.ai) is stored
        // beside the trackmap and referenced by URL; attach it once loaded.
        if(d.edges_url && !d.edges){
          getJSON("data/"+d.edges_url).then(function(eg){ d.edges=eg; scheduleRender(); })
            .catch(function(){});
        }
        scheduleRender();
      }).catch(function(){ l.loading=false; l.shown=false; });
    } else {
      scheduleRender();
    }
  }

  // ---- rendering ------------------------------------------------------
  var traceCanvases=[];
  function buildTraceCanvases(){
    var host=document.getElementById("traces"); host.innerHTML="";
    var h=document.createElement("h2"); h.textContent="Traces"; host.appendChild(h);
    CH.forEach(function(ch){
      var wrap=document.createElement("div"); wrap.style.padding="4px 8px";
      var cv=document.createElement("canvas"); cv.className="trace"; cv.dataset.key=ch.key;
      wrap.appendChild(cv); host.appendChild(wrap);
      traceCanvases.push({ch:ch, cv:cv});
    });
    attachHover();
    attachMapInteraction();
    window.addEventListener("resize", scheduleRender);
  }

  function shownLaps(){ return laps.filter(function(l){ return l.shown && l.data; }); }

  function scheduleRender(){ if(raf) return; raf=requestAnimationFrame(function(){ raf=0; render(); }); }

  function render(){
    var sl=shownLaps();
    if(cursor==null && sl.length) cursor=0;   // default: start line
    laps.forEach(function(l){
      if(l._sw) l._sw.style.opacity = l.shown? "1":"0.35";
      if(l._cb) l._cb.checked = l.shown;
    });
    drawMap(sl);
    traceCanvases.forEach(function(t){ drawTrace(t.cv, t.ch, sl); });
    drawReadout(sl);
    renderSectors(sl);
  }

  function setupCanvas(cv, cssH){
    var dpr=window.devicePixelRatio||1;
    var cssW=cv.clientWidth || cv.parentNode.clientWidth;
    cv.style.height=cssH+"px";
    cv.width=Math.round(cssW*dpr); cv.height=Math.round(cssH*dpr);
    var ctx=cv.getContext("2d"); ctx.setTransform(dpr,0,0,dpr,0,0);
    return {ctx:ctx, w:cssW, h:cssH};
  }

  function css(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

  function chRange(ch, sl){
    if(ch.lo==="sym"||ch.hi==="sym"){
      var m=1; sl.forEach(function(l){ l.data[ch.key].forEach(function(v){ m=Math.max(m,Math.abs(v)); }); });
      m=Math.ceil(m/10)*10; return [-m,m];
    }
    var lo=(ch.lo==="auto")?Infinity:ch.lo, hi=(ch.hi==="auto")?-Infinity:ch.hi;
    if(ch.lo==="auto"||ch.hi==="auto"){
      sl.forEach(function(l){ l.data[ch.key].forEach(function(v){ if(v<lo)lo=v; if(v>hi)hi=v; }); });
      if(!isFinite(lo))lo=0; if(!isFinite(hi))hi=1; if(hi<=lo)hi=lo+1;
      if(ch.lo!=="auto")lo=ch.lo;
      hi=hi+(hi-lo)*0.08;
    }
    return [lo,hi];
  }

  var PADL=42, PADR=10, PADT=8, PADB=18;
  // current x-domain of the traces (nsp units) — [0,1] or the focused sector
  function traceDomain(){ return focus? [focus.d0, focus.d1] : [0,1]; }
  // ~n "nice" tick values covering [lo,hi]; integer=true forces whole steps
  function niceTicks(lo, hi, n, integer){
    var span=hi-lo; if(!(span>0)) return [lo];
    var step=Math.pow(10, Math.floor(Math.log(span/n)/Math.LN10));
    var err=span/(n*step);
    if(err>=7.5) step*=10; else if(err>=3.5) step*=5; else if(err>=1.5) step*=2;
    if(integer) step=Math.max(1, Math.round(step));
    var ticks=[], v=Math.ceil(lo/step-1e-9)*step;
    for(; v<=hi+step*1e-6; v+=step) ticks.push(Math.round(v*1000)/1000);
    return ticks;
  }
  function drawTrace(cv, ch, sl){
    var g=setupCanvas(cv, ch.step?124:132), ctx=g.ctx, w=g.w, h=g.h;
    var plotW=w-PADL-PADR, plotH=h-PADT-PADB;
    ctx.clearRect(0,0,w,h);
    var linec=css("--line"), muted=css("--muted"), textc=css("--text");
    // frame + label
    ctx.strokeStyle=linec; ctx.lineWidth=1;
    ctx.strokeRect(PADL, PADT, plotW, plotH);
    ctx.fillStyle=muted; ctx.font="11px -apple-system,sans-serif";
    ctx.textBaseline="top"; ctx.textAlign="left";
    ctx.fillText(ch.label+(ch.unit?(" ("+ch.unit+")"):""), PADL+4, PADT+3);
    if(!sl.length){ return; }
    var rg=chRange(ch, sl), lo=rg[0], hi=rg[1];
    var dom=traceDomain(), dspan=(dom[1]-dom[0])||1;
    function xOf(p){ return PADL+(p-dom[0])/dspan*plotW; }
    function yOf(v){ return PADT+plotH-(v-lo)/(hi-lo)*plotH; }
    // horizontal gridlines at ~5 nice y-ticks, muted labels
    ctx.textAlign="right"; ctx.textBaseline="middle"; ctx.font="10px -apple-system,sans-serif";
    niceTicks(lo, hi, 5, !!ch.step).forEach(function(val){
      var y=yOf(val);
      if(y<PADT-0.5 || y>PADT+plotH+0.5) return;
      ctx.strokeStyle=linec; ctx.globalAlpha=(val===0&&ch.lo==="sym"?0.9:0.35);
      ctx.beginPath(); ctx.moveTo(PADL,y); ctx.lineTo(PADL+plotW,y); ctx.stroke(); ctx.globalAlpha=1;
      ctx.fillStyle=muted; ctx.fillText(String(val), PADL-4, y);
    });
    // traces + cursor, clipped to the plot so sector focus just works
    ctx.save();
    ctx.beginPath(); ctx.rect(PADL, PADT, plotW, plotH); ctx.clip();
    sl.forEach(function(l){
      var xs=l.data.nsp, ys=l.data[ch.key], n=xs.length;
      ctx.strokeStyle=l.color; ctx.lineWidth=(l===primary?1.8:1.3); ctx.globalAlpha=0.95;
      ctx.beginPath();
      for(var i=0;i<n;i++){
        var x=xOf(xs[i]), y=yOf(ys[i]);
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke(); ctx.globalAlpha=1;
    });
    // cursor
    if(cursor!=null && cursor>=dom[0]-1e-6 && cursor<=dom[1]+1e-6){
      var cx=xOf(cursor);
      ctx.strokeStyle=textc; ctx.globalAlpha=0.5; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(cx,PADT); ctx.lineTo(cx,PADT+plotH); ctx.stroke(); ctx.globalAlpha=1;
      sl.forEach(function(l){
        var s=sampleAt(l.data, cursor); if(!s) return;
        ctx.fillStyle=l.color; ctx.beginPath(); ctx.arc(cx,yOf(s[ch.key]),2.6,0,7); ctx.fill();
      });
      // value box on THIS trace (every trace gets one, not just the hovered)
      var rows=[];
      sl.forEach(function(l){
        var s=sampleAt(l.data, cursor); if(!s) return;
        rows.push({color:l.color, txt:fmtVal(ch, s[ch.key])});
      });
      if(rows.length){
        ctx.font="11px ui-monospace,Menlo,monospace";
        var tw=0;
        rows.forEach(function(r0){ tw=Math.max(tw, ctx.measureText(r0.txt).width); });
        var bw=tw+26, bh=rows.length*16+8;
        var bx=cx+10; if(bx+bw>PADL+plotW-4) bx=cx-10-bw;
        // drop below the channel label when the box would cover it
        var by=(bx<PADL+150)? PADT+22 : PADT+6;
        ctx.globalAlpha=0.92; ctx.fillStyle=css("--panel2");
        ctx.fillRect(bx,by,bw,bh);
        ctx.globalAlpha=1; ctx.strokeStyle=linec; ctx.strokeRect(bx,by,bw,bh);
        rows.forEach(function(r0,ri){
          var ry=by+8+ri*16;
          ctx.fillStyle=r0.color; ctx.fillRect(bx+6,ry,8,8);
          ctx.fillStyle=textc; ctx.textAlign="right"; ctx.textBaseline="top";
          ctx.fillText(r0.txt, bx+bw-6, ry-1);
        });
      }
    }
    ctx.restore();
  }

  function trackEdges(){ return globalEdges || (primary && primary.data ? primary.data.edges : null); }
  function trackImgMeta(){ return primary && primary.data ? primary.data.trackmap : null; }

  var trackImg=null, trackImgUrl=null;
  function ensureTrackImg(url){
    if(trackImgUrl===url) return;
    trackImgUrl=url; trackImg=new Image();
    trackImg.onload=scheduleRender;
    trackImg.onerror=function(){ trackImg=null; };
    trackImg.src="data/"+url;
  }

  // Auto-registration: AC's map.ini offsets are written for the tiny HUD
  // minimap and can be a couple of pixels off (Brands Indy: ~2.5px). Fit a
  // small, bounded shift (+-4px) that best seats the recorded line on the
  // bright track ribbon in map.png. Pure translation only -- measured on real
  // data: scale fits at exactly 1.000 and rotation is negligible.
  var regCache = {};
  function mapRegistration(tm, lap){
    var key = tm.url;
    if(regCache[key]) return regCache[key];
    if(!(trackImg && trackImg.complete && trackImg.naturalWidth) || !lap) return {dx:0, dy:0};
    var W = trackImg.naturalWidth, H = trackImg.naturalHeight;
    var dist;
    try{
      var oc = document.createElement("canvas"); oc.width = W; oc.height = H;
      var octx = oc.getContext("2d"); octx.drawImage(trackImg, 0, 0);
      var im = octx.getImageData(0, 0, W, H).data;
      // chamfer 3-4 distance to the bright, opaque ribbon
      var INF = 1e7; dist = new Float32Array(W*H);
      for(var i2 = 0; i2 < W*H; i2++){
        dist[i2] = (im[i2*4+3] > 150 && im[i2*4] > 150) ? 0 : INF;
      }
      for(var y = 0; y < H; y++) for(var x = 0; x < W; x++){
        var v = dist[y*W+x];
        if(v){
          if(x > 0) v = Math.min(v, dist[y*W+x-1]+3);
          if(y > 0){
            v = Math.min(v, dist[(y-1)*W+x]+3);
            if(x > 0) v = Math.min(v, dist[(y-1)*W+x-1]+4);
            if(x < W-1) v = Math.min(v, dist[(y-1)*W+x+1]+4);
          }
          dist[y*W+x] = v;
        }
      }
      for(var y2 = H-1; y2 >= 0; y2--) for(var x2 = W-1; x2 >= 0; x2--){
        var v2 = dist[y2*W+x2];
        if(v2){
          if(x2 < W-1) v2 = Math.min(v2, dist[y2*W+x2+1]+3);
          if(y2 < H-1){
            v2 = Math.min(v2, dist[(y2+1)*W+x2]+3);
            if(x2 < W-1) v2 = Math.min(v2, dist[(y2+1)*W+x2+1]+4);
            if(x2 > 0) v2 = Math.min(v2, dist[(y2+1)*W+x2-1]+4);
          }
          dist[y2*W+x2] = v2;
        }
      }
    }catch(err){ return (regCache[key] = {dx:0, dy:0}); }  // tainted canvas etc.
    // subsampled line points in raw (unshifted) map space
    var X = lap.x, Z = lap.z, pts = [];
    for(var k = 0; k < X.length; k += 2){
      pts.push([(X[k]+tm.xoff)/tm.scale, (Z[k]+tm.zoff)/tm.scale]);
    }
    function meanDist(dx, dy){
      var tot = 0;
      for(var p = 0; p < pts.length; p++){
        var px = Math.round(pts[p][0]+dx), py = Math.round(pts[p][1]+dy);
        if(px < 0) px = 0; if(px >= W) px = W-1;
        if(py < 0) py = 0; if(py >= H) py = H-1;
        tot += Math.min(dist[py*W+px]/3, 15);   // cap outliers (off-track moments)
      }
      return tot/pts.length;
    }
    var best = {dx:0, dy:0}, bestScore = meanDist(0, 0);
    var unshifted = bestScore;
    for(var dy3 = -4; dy3 <= 4; dy3 += 0.5) for(var dx3 = -4; dx3 <= 4; dx3 += 0.5){
      var s = meanDist(dx3, dy3);
      if(s < bestScore - 1e-6){ bestScore = s; best = {dx:dx3, dy:dy3}; }
    }
    try{
      console.log("[trackmap] registration " + key + ": shift (" + best.dx +
                  ", " + best.dy + ") px; mean dist " + unshifted.toFixed(2) +
                  " -> " + bestScore.toFixed(2));
    }catch(e2){}
    return (regCache[key] = best);
  }

  function drawMap(sl){
    var cv=document.getElementById("map");
    var g=setupCanvas(cv, Math.max(240, Math.min(440, cv.clientWidth))), ctx=g.ctx, w=g.w, h=g.h;
    ctx.clearRect(0,0,w,h);
    var tm=trackImgMeta(), e=trackEdges();
    if(!sl.length && !e && !tm){ mapP=null; return; }

    // "map space": real map.png pixels when we have a track map, else world
    // metres. AC's map.ini transform is (world + OFFSET) / SCALE_FACTOR.
    // True edges (from ai/fast_lane.ai) are WORLD coordinates like the laps,
    // so line-vs-edges alignment is exact under ANY shared transform; the
    // mapRegistration nudge exists only for the image-background fallback.
    var reg = (tm && !e) ? mapRegistration(tm, primary && primary.data) : {dx:0, dy:0};
    var toMap = tm
      ? function(x,z){ return [(x+tm.xoff)/tm.scale + reg.dx, (z+tm.zoff)/tm.scale + reg.dy]; }
      : function(x,z){ return [x,z]; };
    var flip = tm ? false : true;   // world space drawn y-up (flip); image space is y-down

    // fit bbox in map space, framing the shown laps (fall back to edges)
    var minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
    function acc(mx,my){ if(mx<minX)minX=mx; if(mx>maxX)maxX=mx; if(my<minY)minY=my; if(my>maxY)maxY=my; }
    sl.forEach(function(l){ var X=l.data.x,Z=l.data.z; for(var i=0;i<X.length;i++){ var m=toMap(X[i],Z[i]); acc(m[0],m[1]); } });
    if(!isFinite(minX) && e){ for(var k=0;k<e.lx.length;k++){ var ml=toMap(e.lx[k],e.lz[k]), mr=toMap(e.rx[k],e.rz[k]); acc(ml[0],ml[1]); acc(mr[0],mr[1]); } }
    if(!isFinite(minX)){ minX=0;maxX=1;minY=0;maxY=1; }

    var pad=18, spanX=(maxX-minX)||1, spanY=(maxY-minY)||1;
    var base=Math.min((w-2*pad)/spanX,(h-2*pad)/spanY);
    var ox=(w-spanX*base)/2, oy=(h-spanY*base)/2;
    function sBase(mx,my){   // fit-to-view screen coords, BEFORE cam pan/zoom
      var sx=ox+(mx-minX)*base;
      var sy=flip ? (h-(oy+(my-minY)*base)) : (oy+(my-minY)*base);
      return [sx,sy];
    }
    function S(mx,my){ var b=sBase(mx,my); return [b[0]*cam.scale+cam.x, b[1]*cam.scale+cam.y]; }
    function P(x,z){ var m=toMap(x,z); return S(m[0],m[1]); }
    mapP = P;   // map-hover uses the exact transform of the last draw

    // sector focus: aim the cam at the primary lap's points in that sector
    if(mapFitPending){
      mapFitPending=false;
      if(focus && primary && primary.data){
        var fd=primary.data, b0x=Infinity,b1x=-Infinity,b0y=Infinity,b1y=-Infinity;
        for(var fi=0; fi<fd.nsp.length; fi++){
          if(fd.nsp[fi]<focus.d0 || fd.nsp[fi]>focus.d1) continue;
          var fm=toMap(fd.x[fi],fd.z[fi]), fb=sBase(fm[0],fm[1]);
          if(fb[0]<b0x)b0x=fb[0]; if(fb[0]>b1x)b1x=fb[0];
          if(fb[1]<b0y)b0y=fb[1]; if(fb[1]>b1y)b1y=fb[1];
        }
        if(isFinite(b0x)){
          var fpad=26;
          var fsc=Math.min((w-2*fpad)/Math.max(1e-6,b1x-b0x),
                           (h-2*fpad)/Math.max(1e-6,b1y-b0y));
          fsc=Math.max(1, Math.min(14, fsc));
          cam={scale:fsc, x:w/2-(b0x+b1x)/2*fsc, y:h/2-(b0y+b1y)/2*fsc};
        }
      } else {
        cam={scale:1, x:0, y:0};
      }
    }

    // Background priority: TRUE edges (from ai/fast_lane.ai, world coords --
    // exact width and exact alignment with the laps by construction), else
    // the map.png image (stylized: ribbon ~60% of real width, offsets can be
    // a couple px off -- hence mapRegistration in that mode only).
    if(e){
      ctx.beginPath();
      for(var i=0;i<e.lx.length;i++){ var p=P(e.lx[i],e.lz[i]); if(i===0)ctx.moveTo(p[0],p[1]); else ctx.lineTo(p[0],p[1]); }
      for(var j=e.rx.length-1;j>=0;j--){ var q=P(e.rx[j],e.rz[j]); ctx.lineTo(q[0],q[1]); }
      ctx.closePath();
      ctx.fillStyle=css("--muted"); ctx.globalAlpha=0.34; ctx.fill();
      ctx.globalAlpha=0.85; ctx.lineWidth=1.2; ctx.strokeStyle=css("--muted"); ctx.stroke(); ctx.globalAlpha=1;
      var s0=P(e.lx[0],e.lz[0]), s1=P(e.rx[0],e.rz[0]);
      ctx.strokeStyle=css("--text"); ctx.globalAlpha=0.7; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(s0[0],s0[1]); ctx.lineTo(s1[0],s1[1]); ctx.stroke(); ctx.globalAlpha=1;
    } else if(tm){
      ensureTrackImg(tm.url);
      if(trackImg && trackImg.complete && trackImg.naturalWidth){
        // Draw at the PNG's NATURAL pixel size: map.ini pixel space IS the
        // image's own pixel grid. map.ini WIDTH/HEIGHT are informational
        // floats (e.g. 621.492 for a 621px image) -- stretching to them
        // shifts the track visibly down/right of the line when zoomed in.
        var iw=trackImg.naturalWidth, ih=trackImg.naturalHeight;
        var a=S(0,0), b=S(iw,ih);
        ctx.globalAlpha=0.9; ctx.drawImage(trackImg, a[0],a[1], b[0]-a[0], b[1]-a[1]); ctx.globalAlpha=1;
      }
    }

    // driven racing lines — kept thin so track usage is visible
    sl.forEach(function(l){
      var X=l.data.x,Z=l.data.z,n=X.length;
      ctx.strokeStyle=l.color; ctx.lineWidth=(l===primary?1.6:1.2); ctx.globalAlpha=0.95;
      ctx.beginPath();
      for(var i=0;i<n;i++){ var p=P(X[i],Z[i]); if(i===0)ctx.moveTo(p[0],p[1]); else ctx.lineTo(p[0],p[1]); }
      ctx.stroke(); ctx.globalAlpha=1;
    });
    if(cursor!=null){
      sl.forEach(function(l){
        var sm=sampleAt(l.data,cursor); if(!sm) return;
        var p=P(sm.x,sm.z);
        ctx.fillStyle=l.color; ctx.strokeStyle="#000"; ctx.lineWidth=1;
        ctx.beginPath(); ctx.arc(p[0],p[1], l===primary?4.5:3.5, 0,7); ctx.fill(); ctx.stroke();
      });
    }
  }

  function attachMapInteraction(){
    var cv=document.getElementById("map"), dragging=false, lx=0, ly=0;
    cv.addEventListener("wheel", function(e){
      e.preventDefault();
      var r=cv.getBoundingClientRect(), mxp=e.clientX-r.left, myp=e.clientY-r.top;
      var ns=Math.max(1, Math.min(14, cam.scale*Math.exp(-e.deltaY*0.0015)));
      cam.x = mxp-(mxp-cam.x)*(ns/cam.scale);
      cam.y = myp-(myp-cam.y)*(ns/cam.scale);
      cam.scale = ns; scheduleRender();
    }, {passive:false});
    cv.addEventListener("mousedown", function(e){ dragging=true; lx=e.clientX; ly=e.clientY; cv.style.cursor="grabbing"; });
    window.addEventListener("mouseup", function(){ dragging=false; cv.style.cursor="grab"; });
    window.addEventListener("mousemove", function(e){ if(!dragging) return;
      cam.x+=(e.clientX-lx); cam.y+=(e.clientY-ly); lx=e.clientX; ly=e.clientY; scheduleRender(); });
    cv.addEventListener("dblclick", function(){ cam={scale:1,x:0,y:0}; scheduleRender(); });
    cv.style.cursor="grab";
    // hover -> cursor: nearest PRIMARY-lap sample in screen space (<=25 px),
    // via the exact transform of the last draw so pan/zoom is accounted for.
    cv.addEventListener("mousemove", function(e){
      if(dragging) return;
      if(!mapP || !(primary && primary.data)) return;
      var r=cv.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
      var d=primary.data, X=d.x, Z=d.z, best=-1, bd=Infinity;   // nearest point, no radius cap
      for(var i=0;i<X.length;i++){
        var p=mapP(X[i],Z[i]);
        var dx=p[0]-mx, dy=p[1]-my, q=dx*dx+dy*dy;
        if(q<bd){ bd=q; best=i; }
      }
      var nc = best>=0 ? d.nsp[best] : null;
      if(nc!==cursor){ cursor=nc; scheduleRender(); }
    });
    // mouseleave intentionally keeps the last cursor: the At-cursor panel
    // stays populated (defaults to the start line before any hover).
  }

  function drawReadout(sl){
    var t=document.getElementById("readout");
    var cp=document.getElementById("cursorpos");
    if(cursor==null || !sl.length){ t.innerHTML=""; cp.textContent=""; return; }
    var len = primary && primary.data ? primary.data.track_len_m : 0;
    cp.textContent = len? ("· "+Math.round(cursor*len)+" m") : ("· "+Math.round(cursor*100)+"%");
    var cols = CH.map(function(c){ return c.label.slice(0,4); });
    var html = "<thead><tr><th>Lap</th>";
    CH.forEach(function(c){ html+="<th>"+c.label.slice(0,3)+"</th>"; });
    html += "<th>Δ</th></tr></thead><tbody>";
    var p = primary && primary.shown && primary.data ? sampleAt(primary.data, cursor) : null;
    sl.forEach(function(l){
      var s=sampleAt(l.data, cursor); if(!s) return;
      html += "<tr><td><span class='swatch' style='display:inline-block;background:"+l.color+"'></span> "+esc(l.rec.user)+"</td>";
      html += "<td>"+Math.round(s.thr)+"</td><td>"+Math.round(s.brk)+"</td><td>"+Math.round(s.spd)+"</td>";
      html += "<td>"+Math.round(s.gear)+"</td><td>"+s.str.toFixed(0)+"</td>";
      var dl="";
      if(p && l!==primary){ var d=(s.t-p.t)/1000; dl=(d>=0?"+":"")+d.toFixed(2); }
      html += "<td class='dl' style='color:"+(dl&&dl[0]==="+"?"#f85149":(dl?"#3fb950":"var(--muted)"))+"'>"+dl+"</td></tr>";
    });
    t.innerHTML = html+"</tbody>";
  }

  // ---- sectors --------------------------------------------------------
  function splitsOf(l){
    if(!l) return null;
    if(l.data && Array.isArray(l.data.splits) && l.data.splits.length) return l.data.splits;
    if(l.rec && Array.isArray(l.rec.splits) && l.rec.splits.length) return l.rec.splits;
    return null;
  }
  function fmtSec(ms){ return (ms/1000).toFixed(3); }
  // nsp (distance fraction) where the primary lap's cumulative time crosses T
  function nspAtTime(d, T){
    var t=d.t, n=t.length; if(!n) return 0;
    if(T<=t[0]) return d.nsp[0];
    if(T>=t[n-1]) return d.nsp[n-1];
    var lo=0, hi=n-1;
    while(lo<hi-1){ var mid=(lo+hi)>>1; if(t[mid]<T) lo=mid; else hi=mid; }
    var f=(T-t[lo])/((t[hi]-t[lo])||1);
    return d.nsp[lo]+(d.nsp[hi]-d.nsp[lo])*f;
  }
  var _bounds=null;   // cached per-sector [d0,d1] nsp ranges of the primary lap
  function sectorBounds(){
    if(_bounds) return _bounds;
    if(!(primary && primary.data)) return null;
    var sp=splitsOf(primary); if(!sp) return null;
    var cuts=[0], cum=0;
    for(var i=0;i<sp.length-1;i++){ cum+=sp[i]; cuts.push(nspAtTime(primary.data, cum)); }
    cuts.push(1);
    _bounds=[];
    for(var k=0;k<sp.length;k++) _bounds.push([cuts[k], cuts[k+1]]);
    return _bounds;
  }
  function focusSector(i){
    var b=sectorBounds(); if(!b || !b[i]) return;
    focus={i:i, d0:b[i][0], d1:b[i][1]};
    mapFitPending=true; secSig=""; scheduleRender();
  }
  function focusAll(){
    focus=null; mapFitPending=true; secSig=""; scheduleRender();
  }
  var secSig="";
  function renderSectors(sl){
    var card=document.getElementById("sectors"), body=document.getElementById("secbody");
    if(!(primary && primary.data)){ card.style.display="none"; secSig=""; return; }
    var ps=splitsOf(primary);
    var sig=(ps?ps.join(","):"none")+"|"+(focus?focus.i:-1)+"|"+
      sl.map(function(l){ return l.rec.telemetry; }).join(";");
    if(sig===secSig) return;
    secSig=sig;
    card.style.display="";
    body.innerHTML="";
    if(!ps){
      var mu=document.createElement("div"); mu.className="secmuted";
      mu.textContent="No sector data — lap predates sector recording.";
      body.appendChild(mu);
      return;
    }
    // focus buttons [S1]..[Sn][All]
    var bar=document.createElement("div"); bar.className="secbtns";
    ps.forEach(function(_, i){
      var b=document.createElement("button"); b.textContent="S"+(i+1);
      if(focus && focus.i===i) b.className="on";
      b.addEventListener("click", function(){ focusSector(i); });
      bar.appendChild(b);
    });
    var all=document.createElement("button"); all.textContent="All";
    if(!focus) all.className="on";
    all.addEventListener("click", focusAll);
    bar.appendChild(all);
    body.appendChild(bar);
    // sector times: primary plain, other shown laps colored vs primary
    var html="<thead><tr><th>Lap</th>";
    ps.forEach(function(_, i){ html+="<th>S"+(i+1)+"</th>"; });
    html+="</tr></thead><tbody>";
    function rowFor(l, sp){
      var r="<tr><td><span class='swatch' style='display:inline-block;background:"+l.color+
        "'></span> "+(l.trophy? l.trophy+" ":"")+esc(l.rec.user)+"</td>";
      for(var i=0;i<ps.length;i++){
        if(i>=sp.length){ r+="<td></td>"; continue; }
        var col="";
        if(l!==primary){
          if(sp[i]<ps[i]) col="color:#3fb950"; else if(sp[i]>ps[i]) col="color:#f85149";
        }
        r+="<td style='"+col+"'>"+fmtSec(sp[i])+"</td>";
      }
      return r+"</tr>";
    }
    html+=rowFor(primary, ps);
    sl.forEach(function(l){
      if(l===primary) return;
      var sp=splitsOf(l); if(!sp) return;
      html+=rowFor(l, sp);
    });
    var tbl=document.createElement("table"); tbl.className="sectable";
    tbl.innerHTML=html+"</tbody>";
    body.appendChild(tbl);
  }

  // interpolate all channels of a lap at normalized position p (0..1)
  function sampleAt(d, p){
    var ns=d.nsp, n=ns.length; if(!n) return null;
    var lo=0, hi=n-1;
    if(p<=ns[0]) return at(d,0);
    if(p>=ns[n-1]) return at(d,n-1);
    while(lo<hi-1){ var mid=(lo+hi)>>1; if(ns[mid]<p) lo=mid; else hi=mid; }
    var f=(p-ns[lo])/((ns[hi]-ns[lo])||1);
    var o={}; ["thr","brk","spd","gear","str","x","z","t"].forEach(function(k){
      o[k]=d[k][lo]+(d[k][hi]-d[k][lo])*f; });
    return o;
  }
  function at(d,i){ var o={}; ["thr","brk","spd","gear","str","x","z","t"].forEach(function(k){ o[k]=d[k][i]; }); return o; }

  // ---- hover ----------------------------------------------------------
  function fmtVal(ch, v){
    if(ch.key==="spd") return Math.round(v)+" km/h";
    if(ch.key==="gear") return String(Math.round(v));
    if(ch.key==="str") return v.toFixed(0)+"°";
    return Math.round(v)+"%";   // thr / brk
  }
  function attachHover(){
    function handle(e, cv, ch){
      var rect=cv.getBoundingClientRect();
      var cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
      var plotW=cv.clientWidth-PADL-PADR;
      var dom=traceDomain();
      var f=Math.max(0,Math.min(1,(cx-PADL)/plotW));
      cursor=dom[0]+f*(dom[1]-dom[0]);   // map mouse x into the (possibly focused) domain
      scheduleRender();
    }
    traceCanvases.forEach(function(t){
      t.cv.addEventListener("mousemove",function(e){ handle(e,t.cv,t.ch); });
      t.cv.addEventListener("touchmove",function(e){ handle(e,t.cv,t.ch); e.preventDefault(); }, {passive:false});
    });

  }
})();
</script>
